<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail page</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body>
    <header>
        <nav id="main-nav">
            <a href="index.html" id="logo-image"><img src="assets/logo/logo.png" alt="Music Player"></a>
            <a href="index.html" id="main-page">Home</a>
            <a href="library.html" id="library">Library</a>
            <a href="trending.html" id="trending-page">Trending</a>
        </nav>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="What song for today?...">
        </div>
        <div id="auth-area"></div>
    </header>

    <main class="detail-page" id="app">
        <div class="song-detail-container">
            <div class="song-poster">
                <img id="detail-cover" src="" alt="Cover" style="width: 100%; border-radius: 10px;">
            </div>
            
            <div class="song-info-content">
                <h1 id="detail-title">Loading...</h1>
                <h3 id="detail-artist" style="color: var(--text-gray); margin-bottom: 15px;">Artist Name</h3>
                
                <div class="extra-info" style="margin-bottom: 20px; font-size: 0.9rem;">
                    <p><strong>Album:</strong> <span id="detail-album">N/A</span></p>
                    <p><strong>Genre:</strong> <span id="detail-genre" style="text-transform: capitalize;">N/A</span></p>
                    <p><strong>Country:</strong> <span id="detail-country" style="text-transform: uppercase;">N/A</span></p>
                    <p><strong>Views:</strong> <span id="detail-views">0</span></p>
                </div>
                
                <div class="detail-actions" style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <button id="btn-add-to-pl" class="secondary-btn" style="background: transparent; border: 1px solid var(--text-gray); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer;">Add to Playlist</button>
                    <button id="btn-play-detail" class="main-btn" style="background: var(--primary-color); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">Play Now ▶</button>
                    <button id="btn-add-fav" class="secondary-btn" style="background: transparent; border: 1px solid var(--text-gray); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer;">🤍 Add to Library</button>
                    <button id="btn-download" class="secondary-btn" style="background: transparent; border: 1px solid var(--text-gray); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer;">Download ⬇</button>
                </div>

                <div class="lyrics-section" style="margin-top: 30px;">
                    <h4 style="margin-bottom: 10px; color: var(--primary-color);">Lyrics</h4>
                    <div id="detail-lyrics" style="color: var(--text-gray); line-height: 1.6;">
                        No lyrics available.
                    </div>
                </div>
            </div>
        </div>

        <div class="related-section" style="margin-top: 50px;">
            <h2 style="border-left: 4px solid var(--primary-color); padding-left: 10px;">You might also like</h2>
            <div id="song-list" class="song-list-container"></div>
        </div>
    </main>

    <div id="player-bar" class="current-song-info" style="display: none;">
        <img id="player-cover" src="" alt="">
        <div>
            <h4 id="player-title"></h4>
            <p id="player-artist"></p>
        </div>
        <div id="toggle-player" style="display: flex;">
            <button class="previous-btn toggle-btn">⏮</button>
            <button class="play-pause-btn toggle-btn">⏸</button>
            <button class="next-btn toggle-btn">⏭</button>
        </div>
        <div class="time-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
            <span id="duration-time">0:00</span>
        </div>
        <input type="range" id="volume-bar" min="0" max="1" value="1" step="0.05">
    </div>

    <footer>
        <a href="aboutUs.html">About us</a>
        <span><strong>Email: </strong>hoangtrang555htm@gmail.com</span>
    </footer>
    <div id="playlist-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: #181818; padding: 20px; border-radius: 10px; width: 300px; max-height: 400px; overflow-y: auto;">
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">Save to...</h3>
            <button id="btn-create-new-pl" style="width: 100%; padding: 10px; background: transparent; border: 1px solid var(--text-gray); color: white; border-radius: 5px; cursor: pointer; margin-bottom: 15px;">+ New Playlist</button>
            <div id="user-playlists-container" style="display: flex; flex-direction: column; gap: 10px;">
                </div>
            <button id="close-pl-modal" style="margin-top: 20px; width: 100%; padding: 10px; background: var(--primary-color); border: none; border-radius: 5px; color: white; cursor: pointer;">Done</button>
        </div>
    </div>
    <audio id="main-audio" src=""></audio>
    <script type="module" src="js/detail.js"></script>
</body>
</html>
